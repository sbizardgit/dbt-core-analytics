version: 2
sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: primary key for customer data
            data_tests:
              - unique
              - not_null  
      - name: orders   
        config:
          freshness:
            warn_after:
              count: 6
              period: day
            error_after:
              count: 12
              period: day
          loaded_at_field: _etl_loaded_at
        columns:
          - name: id
            description: primary key for order data
            data_tests:
              - unique
              - not_null     